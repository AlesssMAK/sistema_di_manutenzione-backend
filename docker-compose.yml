services:
  mongo:
    image: mongo:7
    container_name: mms-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  mailpit:
    image: axllent/mailpit:latest
    container_name: mms-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI (http://localhost:8025)

volumes:
  mongo-data:
